<html lang="ja"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>発想ゲーム</title>
<link href="./発想ゲーム_files/css2" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f11;
    --bg2: #1a1a1f;
    --bg3: #25252c;
    --border: rgba(255,255,255,0.1);
    --border2: rgba(255,255,255,0.18);
    --text: #f0f0f2;
    --text2: #8888a0;
    --text3: #555568;
    --accent: #c8f03c;
    --accent-dim: rgba(200,240,60,0.12);
    --accent-border: rgba(200,240,60,0.35);
    --danger: #ff5f5f;
    --danger-dim: rgba(255,95,95,0.12);
    --success: #4cf0a0;
    --radius: 12px;
    --radius-sm: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body {
    height: 100%; background: var(--bg);
    font-family: 'Noto Sans JP', sans-serif;
    color: var(--text); font-size: 15px; line-height: 1.5;
    overscroll-behavior: none;
  }
  body { display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding: 0; }
  #app { width: 100%; max-width: 420px; min-height: 100vh; padding: 24px 16px 40px; }

  /* Typography */
  h1 { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; }
  h2 { font-size: 20px; font-weight: 500; }
  .mono { font-family: 'DM Mono', monospace; }
  .dim { color: var(--text2); }
  .small { font-size: 12px; }

  /* Cards */
  .card {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 16px;
  }
  .card-accent {
    background: var(--accent-dim); border: 1px solid var(--accent-border);
    border-radius: var(--radius); padding: 16px;
  }

  /* Buttons */
  button {
    font-family: 'Noto Sans JP', sans-serif;
    cursor: pointer; border: none; border-radius: var(--radius-sm);
    font-size: 14px; font-weight: 500; transition: all 0.15s;
  }
  .btn-primary {
    background: var(--accent); color: #1a1a1f;
    padding: 14px 20px; width: 100%; font-size: 15px;
  }
  .btn-primary:hover { filter: brightness(1.1); }
  .btn-primary:active { transform: scale(0.98); }
  .btn-primary:disabled { opacity: 0.3; cursor: not-allowed; transform: none; filter: none; }
  .btn-ghost {
    background: transparent; color: var(--text2);
    border: 1px solid var(--border); padding: 12px 20px; width: 100%;
  }
  .btn-ghost:hover { background: var(--bg3); color: var(--text); border-color: var(--border2); }
  .btn-danger {
    background: var(--danger-dim); color: var(--danger);
    border: 1px solid rgba(255,95,95,0.25); padding: 6px 10px;
    font-size: 13px; border-radius: 6px;
  }
  .btn-small {
    background: var(--bg3); color: var(--text2);
    border: 1px solid var(--border); padding: 8px 14px; font-size: 13px;
  }
  .btn-small:hover { background: var(--bg2); color: var(--text); }

  /* Inputs */
  input[type="text"] {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--radius-sm); color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 15px; padding: 12px 14px; width: 100%;
    outline: none; transition: border-color 0.15s;
  }
  input[type="text"]:focus { border-color: var(--accent); }
  input[type="text"]::placeholder { color: var(--text3); }

  /* Layout helpers */
  .stack { display: flex; flex-direction: column; }
  .row { display: flex; align-items: center; gap: 8px; }
  .gap-4 { gap: 4px; }
  .gap-8 { gap: 8px; }
  .gap-12 { gap: 12px; }
  .gap-16 { gap: 16px; }
  .mb-4 { margin-bottom: 4px; }
  .mb-8 { margin-bottom: 8px; }
  .mb-12 { margin-bottom: 12px; }
  .mb-16 { margin-bottom: 16px; }
  .mb-24 { margin-bottom: 24px; }
  .mt-8 { margin-top: 8px; }
  .mt-12 { margin-top: 12px; }
  .mt-16 { margin-top: 16px; }
  .mt-24 { margin-top: 24px; }
  .text-center { text-align: center; }
  .flex-1 { flex: 1; }
  .justify-between { justify-content: space-between; }

  /* Stars */
  .stars { color: var(--accent); letter-spacing: 1px; font-size: 11px; }
  .stars-dim { color: var(--text3); }

  /* Player chip */
  .player-chip {
    display: flex; align-items: center; justify-content: space-between;
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 10px 14px;
  }
  .avatar {
    width: 36px; height: 36px; border-radius: 50%;
    background: var(--bg3); border: 1px solid var(--border2);
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 700; color: var(--accent);
    flex-shrink: 0;
  }

  /* Theme item */
  .theme-item {
    display: flex; align-items: center; justify-content: space-between;
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 10px 14px;
  }

  /* Countdown ring */
  .cd-ring-wrap { position: relative; display: inline-flex; align-items: center; justify-content: center; }
  .cd-num { position: absolute; font-size: 48px; font-weight: 700; font-family: 'DM Mono', monospace; color: var(--accent); }

  /* Answer card */
  .answer-card {
    display: flex; align-items: center; justify-content: space-between;
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 14px 16px;
    transition: all 0.3s; animation: fadeIn 0.25s ease;
  }
  .answer-card.dupe { opacity: 0.35; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  /* Score row */
  .score-row {
    display: flex; align-items: center; justify-content: space-between;
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 14px 16px;
  }
  .score-row.winner { background: var(--accent-dim); border-color: var(--accent-border); }

  /* Round badge */
  .badge {
    display: inline-block; padding: 3px 10px; border-radius: 100px;
    font-size: 11px; font-weight: 500; letter-spacing: 0.05em;
    background: var(--bg3); border: 1px solid var(--border); color: var(--text2);
  }
  .badge-accent { background: var(--accent-dim); border-color: var(--accent-border); color: var(--accent); }
  .badge-danger { background: var(--danger-dim); border-color: rgba(255,95,95,0.3); color: var(--danger); }

  /* Vote button */
  .vote-btn {
    display: flex; align-items: center; justify-content: space-between;
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 13px 15px;
    cursor: pointer; width: 100%; transition: all 0.15s;
    text-align: left;
  }
  .vote-btn:hover { background: var(--bg3); border-color: var(--border2); }

  /* Divider */
  .divider { height: 1px; background: var(--border); margin: 16px 0; }

  /* Screen transitions */
  .screen { animation: screenIn 0.2s ease; }
  @keyframes screenIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

  /* Big keyword display */
  .keyword-box {
    background: var(--bg3); border: 1px solid var(--border2);
    border-radius: var(--radius); padding: 20px;
    text-align: center;
  }
  .keyword-label { font-size: 10px; letter-spacing: 0.12em; color: var(--text3); text-transform: uppercase; margin-bottom: 6px; }
  .keyword-main { font-size: 30px; font-weight: 700; color: var(--text); }
  .keyword-main.accent { color: var(--accent); }
</style>
</head>
<body>
<div id="app"><div class="screen">
    <div class="mb-24">
      <div class="badge mb-12">WORD GAME</div>
      <h1 class="mb-4">発想ゲーム</h1>
      <p class="dim" style="font-size:13px">形容詞 × テーマで固有名詞を答えよう</p>
    </div>
    <p style="font-size:12px;color:var(--text3);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:8px">プレイヤー 0/5</p>
    
    
    <div class="row mb-16 mt-8">
      <input id="pi" type="text" placeholder="名前を入力（10文字以内）" maxlength="10" value="" style="flex:1">
      <button class="btn-small" data-action="addp" style="white-space:nowrap;padding:12px 16px">追加</button>
    </div>
    <button class="btn-primary" data-action="gonext" disabled="">
      テーマを入力する →
    </button>
    <p class="dim small text-center mt-8">2人以上必要です</p>
  </div></div>
<script>
const ADJ = ['かっこいい','かわいい','赤い','おいしい','エモい','怖い','面白い','悲しい','優しい','強い','クールな','ヤバい','尊い','懐かしい','不思議な','最強の','弱そうな','派手な','地味な','おしゃれな','古い','新しい','悪い','明るい','暗い','重い','軽い','高い','低い'];

const BASE_THEMES = [
  {name:'食べ物',s:1},{name:'動物',s:1},{name:'スポーツ',s:1},{name:'国',s:1},{name:'乗り物',s:1},
  {name:'漫画タイトル',s:2},{name:'映画',s:2},{name:'ゲームキャラ',s:2},{name:'ブランド',s:2},
  {name:'SNS有名人',s:3},{name:'海外芸能人',s:3},{name:'アニメキャラ',s:2}
];

let G;
function newGame() {
  G = {
    screen: 'setup',
    players: [],
    pInput: '',
    themes: BASE_THEMES.map(t => ({...t})),
    tStep: 0,
    tInputs: ['',''],
    round: 0,
    totalRounds: 5,
    scores: {},
    used: {},
    usedThemes: [],
    curTheme: null,
    curAdj: null,
    answers: [],
    answerIdx: 0,
    answerInput: '',
    votes: {},
    voteIdx: 0,
    csec: 8,
    ctimer: null,
    lastRoundScores: {}
  };
}
newGame();

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function stars(n) {
  return '<span class="stars">' + '★'.repeat(n) + '</span><span class="stars-dim">' + '★'.repeat(3-n) + '</span>';
}

function calcScores() {
  const cnt = {};
  for (const a of G.answers) {
    const k = a.v.trim().toLowerCase();
    cnt[k] = (cnt[k] || 0) + 1;
  }
  const rs = {};
  for (const p of G.players) rs[p.id] = 0;
  const mult = G.round === G.totalRounds ? 2 : 1;
  for (const a of G.answers) {
    if (cnt[a.v.trim().toLowerCase()] === 1) {
      rs[a.pid] = (1 + G.curTheme.s) * mult;
    }
  }
  // vote bonus
  const vc = {};
  for (const [, t] of Object.entries(G.votes)) if (t) vc[t] = (vc[t] || 0) + 1;
  const mv = Object.keys(vc).length ? Math.max(...Object.values(vc)) : 0;
  if (mv > 0) for (const [id, c] of Object.entries(vc)) if (c === mv) rs[id] = (rs[id] || 0) + 1;
  for (const [id, pts] of Object.entries(rs)) G.scores[id] = (G.scores[id] || 0) + pts;
  return rs;
}

function nextRound() {
  G.round++;
  G.answers = []; G.votes = {}; G.voteIdx = 0; G.answerIdx = 0; G.answerInput = '';
  const avail = G.themes.filter(t => !G.usedThemes.includes(t.name));
  const t = avail[Math.floor(Math.random() * avail.length)];
  G.curTheme = t; G.usedThemes.push(t.name);
  G.curAdj = ADJ[Math.floor(Math.random() * ADJ.length)];
  G.screen = 'rahead';
  render();
}

function startCD() {
  G.csec = 8;
  if (G.ctimer) clearInterval(G.ctimer);
  render();
  G.ctimer = setInterval(() => {
    G.csec--;
    const numEl = document.getElementById('cd-num');
    const arcEl = document.getElementById('cd-arc');
    if (numEl) numEl.textContent = G.csec;
    const circ = 2 * Math.PI * 54;
    if (arcEl) arcEl.style.strokeDashoffset = circ * (G.csec / 8);
    if (G.csec <= 0) {
      clearInterval(G.ctimer); G.ctimer = null;
      G.screen = 'apass'; G.answerIdx = 0;
      render();
    }
  }, 1000);
}

// Render
function render() {
  if (G.ctimer && G.screen !== 'cd') { clearInterval(G.ctimer); G.ctimer = null; }
  const screens = {
    setup: renderSetup,
    tsub: renderTSub,
    trev: renderTRev,
    rahead: renderRAhead,
    cd: renderCD,
    apass: renderAPass,
    ainput: renderAInput,
    reveal: renderReveal,
    voting: renderVoting,
    rresult: renderRResult,
    final: renderFinal
  };
  const app = document.getElementById('app');
  app.innerHTML = '<div class="screen">' + (screens[G.screen] || renderSetup)() + '</div>';
  bindEvents();
  if (G.screen === 'ainput') {
    const f = document.getElementById('ainput');
    if (f) { f.focus(); f.setSelectionRange(f.value.length, f.value.length); }
  }
  if (G.screen === 'setup') {
    const pi = document.getElementById('pi');
    if (pi) pi.focus();
  }
}

function bindEvents() {
  document.querySelectorAll('[data-action]').forEach(el => {
    el.addEventListener('click', handleAction);
  });
  const pi = document.getElementById('pi');
  if (pi) {
    pi.addEventListener('input', e => G.pInput = e.target.value);
    pi.addEventListener('keydown', e => { if (e.key === 'Enter') doAddPlayer(); });
  }
  const t0 = document.getElementById('t0'), t1 = document.getElementById('t1');
  if (t0) t0.addEventListener('input', e => G.tInputs[0] = e.target.value);
  if (t1) t1.addEventListener('input', e => G.tInputs[1] = e.target.value);
  const af = document.getElementById('ainput');
  if (af) {
    af.addEventListener('input', e => G.answerInput = e.target.value);
    af.addEventListener('keydown', e => { if (e.key === 'Enter') doSubmitAnswer(); });
  }
}

function handleAction(e) {
  const a = e.currentTarget.dataset.action;
  const d = e.currentTarget.dataset;
  if (a === 'addp') doAddPlayer();
  else if (a === 'rmp') { G.players.splice(+d.i, 1); render(); }
  else if (a === 'gonext') { if (G.players.length >= 2) { G.tStep = 0; G.tInputs = ['','']; G.screen = 'tsub'; render(); } }
  else if (a === 'subt') doSubmitTheme();
  else if (a === 'rmt') { G.themes.splice(+d.i, 1); render(); }
  else if (a === 'startg') {
    for (const p of G.players) { G.scores[p.id] = 0; G.used[p.id] = new Set(); }
    nextRound();
  }
  else if (a === 'startcd') { G.screen = 'cd'; startCD(); }
  else if (a === 'readya') { G.answerInput = ''; G.screen = 'ainput'; render(); }
  else if (a === 'suba') doSubmitAnswer();
  else if (a === 'govote') { G.votes = {}; G.voteIdx = 0; G.screen = 'voting'; render(); }
  else if (a === 'vote') {
    const voter = G.players[G.voteIdx];
    G.votes[voter.id] = d.t;
    G.voteIdx++;
    if (G.voteIdx >= G.players.length) { G.lastRoundScores = calcScores(); G.screen = 'rresult'; }
    render();
  }
  else if (a === 'skipv') {
    const voter = G.players[G.voteIdx];
    G.votes[voter.id] = null;
    G.voteIdx++;
    if (G.voteIdx >= G.players.length) { G.lastRoundScores = calcScores(); G.screen = 'rresult'; }
    render();
  }
  else if (a === 'nextr') nextRound();
  else if (a === 'final') { G.screen = 'final'; render(); }
  else if (a === 'restart') { newGame(); render(); }
}

function doAddPlayer() {
  const pi = document.getElementById('pi');
  const v = (pi ? pi.value : G.pInput).trim();
  if (v && G.players.length < 5) {
    G.players.push({ id: 'p' + Date.now() + Math.random(), name: v });
    G.pInput = '';
    render();
  }
}

function doSubmitTheme() {
  const v0 = (document.getElementById('t0')?.value || G.tInputs[0]).trim();
  const v1 = (document.getElementById('t1')?.value || G.tInputs[1]).trim();
  if (v0) G.themes.push({ name: v0, s: 2 });
  if (v1) G.themes.push({ name: v1, s: 2 });
  G.tStep++;
  if (G.tStep >= G.players.length) { G.screen = 'trev'; }
  else { G.tInputs = ['','']; }
  render();
}

function doSubmitAnswer() {
  const af = document.getElementById('ainput');
  const v = (af ? af.value : G.answerInput).trim();
  if (!v) return;
  const p = G.players[G.answerIdx];
  if (G.used[p.id].has(v.toLowerCase())) {
    alert('この回答はすでに使っています！');
    return;
  }
  G.used[p.id].add(v.toLowerCase());
  G.answers.push({ pid: p.id, pn: p.name, v });
  G.answerIdx++;
  G.answerInput = '';
  if (G.answerIdx >= G.players.length) { G.screen = 'reveal'; }
  else { G.screen = 'apass'; }
  render();
}

// ─── Screen renderers ────────────────────────────────────────────────

function renderSetup() {
  const pl = G.players.map((p, i) => `
    <div class="player-chip mb-8">
      <div class="row gap-12">
        <div class="avatar">${p.name.charAt(0)}</div>
        <span style="font-size:15px">${p.name}</span>
      </div>
      <button class="btn-danger" data-action="rmp" data-i="${i}">削除</button>
    </div>`).join('');
  const canAdd = G.players.length < 5;
  const canStart = G.players.length >= 2;
  return `
    <div class="mb-24">
      <div class="badge mb-12">WORD GAME</div>
      <h1 class="mb-4">発想ゲーム</h1>
      <p class="dim" style="font-size:13px">形容詞 × テーマで固有名詞を答えよう</p>
    </div>
    <p style="font-size:12px;color:var(--text3);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:8px">プレイヤー ${G.players.length}/5</p>
    ${pl}
    ${canAdd ? `
    <div class="row mb-16 mt-8">
      <input id="pi" type="text" placeholder="名前を入力（10文字以内）" maxlength="10" value="${G.pInput}" style="flex:1"/>
      <button class="btn-small" data-action="addp" style="white-space:nowrap;padding:12px 16px">追加</button>
    </div>` : '<div class="mb-16"></div>'}
    <button class="btn-primary" data-action="gonext" ${canStart ? '' : 'disabled'}>
      テーマを入力する →
    </button>
    ${!canStart ? '<p class="dim small text-center mt-8">2人以上必要です</p>' : ''}
  `;
}

function renderTSub() {
  const p = G.players[G.tStep];
  const isLast = G.tStep === G.players.length - 1;
  return `
    <div class="row mb-24">
      <div class="badge">${G.tStep + 1} / ${G.players.length}</div>
      <span class="dim small">テーマ入力</span>
    </div>
    <div class="row gap-12 mb-20">
      <div class="avatar" style="width:44px;height:44px;font-size:16px">${p.name.charAt(0)}</div>
      <div>
        <h2>${p.name}</h2>
        <p class="dim small">テーマを2つまで入力</p>
      </div>
    </div>
    <div class="card mb-12" style="background:var(--bg3);border:1px solid var(--border)">
      <p class="dim small mb-8" style="letter-spacing:0.05em;font-size:11px;text-transform:uppercase">ルール</p>
      <p class="small dim">名詞のみ・最大20文字・文章NG</p>
    </div>
    <input id="t0" type="text" placeholder="テーマ1（例：食べ物）" maxlength="20" value="${G.tInputs[0]}" class="mb-8"/>
    <input id="t1" type="text" placeholder="テーマ2（任意）" maxlength="20" value="${G.tInputs[1]}" class="mb-24"/>
    <button class="btn-primary" data-action="subt">
      ${isLast ? 'テーマ確認へ →' : '次のプレイヤーへ →'}
    </button>
  `;
}

function renderTRev() {
  const items = G.themes.map((t, i) => `
    <div class="theme-item mb-6">
      <div class="row gap-8">
        <span style="font-size:14px">${t.name}</span>
        <span>${stars(t.s)}</span>
        <span class="dim small">+${1+t.s}点</span>
      </div>
      <button class="btn-danger" data-action="rmt" data-i="${i}">削除</button>
    </div>`).join('');
  const ok = G.themes.length >= G.totalRounds;
  return `
    <div class="mb-20">
      <div class="badge mb-12">THEME CHECK</div>
      <h2 class="mb-4">テーマ確認</h2>
      <p class="dim small">不適切なテーマは削除できます</p>
    </div>
    <div style="max-height:50vh;overflow-y:auto;margin-bottom:8px">${items}</div>
    <p class="dim small mb-16">${G.themes.length}個のテーマ（${G.totalRounds}ラウンド分必要）</p>
    <button class="btn-primary" data-action="startg" ${ok ? '' : 'disabled'}>ゲーム開始！</button>
  `;
}

function renderRAhead() {
  const isFinal = G.round === G.totalRounds;
  return `
    <div class="text-center" style="padding:2rem 0">
      <div class="badge ${isFinal ? 'badge-accent' : ''} mb-16">
        ROUND ${G.round} / ${G.totalRounds}${isFinal ? ' — FINAL' : ''}
      </div>
      <h1 class="mb-8" style="font-size:36px">
        ${isFinal ? 'FINAL' : 'ROUND ' + G.round}
      </h1>
      ${isFinal ? '<p style="color:var(--accent);font-size:14px;margin-bottom:2rem">このラウンドは得点2倍！</p>' : '<div style="margin-bottom:2rem"></div>'}
      <p class="dim small mb-24">全員でスクリーンを見てください</p>
      <button class="btn-primary" data-action="startcd" style="font-size:16px;padding:16px">
        カウントダウン開始
      </button>
    </div>
  `;
}

function renderCD() {
  const r = 54, circ = 2 * Math.PI * r;
  const offset = circ * (G.csec / 8);
  return `
    <div class="text-center" style="padding:1rem 0">
      <div class="badge mb-20">ROUND ${G.round}</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:24px">
        <div class="keyword-box">
          <div class="keyword-label">テーマ</div>
          <div class="keyword-main" style="font-size:22px">${G.curTheme.name}</div>
          <div style="margin-top:4px">${stars(G.curTheme.s)}</div>
        </div>
        <div class="keyword-box">
          <div class="keyword-label">形容詞</div>
          <div class="keyword-main accent" style="font-size:20px">${G.curAdj}</div>
        </div>
      </div>
      <div class="cd-ring-wrap" style="margin-bottom:20px">
        <svg width="120" height="120">
          <circle cx="60" cy="60" r="${r}" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="6"/>
          <circle id="cd-arc" cx="60" cy="60" r="${r}" fill="none" stroke="var(--accent)" stroke-width="6"
            stroke-dasharray="${circ.toFixed(1)}" stroke-dashoffset="${offset.toFixed(1)}"
            stroke-linecap="round" transform="rotate(-90 60 60)"
            style="transition:stroke-dashoffset 0.9s linear"/>
        </svg>
        <span id="cd-num" class="cd-num">${G.csec}</span>
      </div>
      <p class="dim small">頭の中で答えを考えよう！</p>
    </div>
  `;
}

function renderAPass() {
  const p = G.players[G.answerIdx];
  return `
    <div class="text-center" style="padding:2rem 0">
      <p class="dim small mb-20">他のプレイヤーは画面を見ないでください</p>
      <div class="avatar" style="width:72px;height:72px;font-size:26px;border-radius:50%;margin:0 auto 16px">
        ${p.name.charAt(0)}
      </div>
      <h2 class="mb-4">${p.name}</h2>
      <p class="dim small mb-32">さんに渡してください</p>
      <div class="card mb-16" style="text-align:left">
        <div class="row justify-between mb-8">
          <span class="dim small">テーマ</span>
          <span style="font-size:14px;font-weight:500">${G.curTheme.name} ${stars(G.curTheme.s)}</span>
        </div>
        <div class="row justify-between">
          <span class="dim small">形容詞</span>
          <span style="color:var(--accent);font-size:16px;font-weight:700">${G.curAdj}</span>
        </div>
      </div>
      <button class="btn-primary" data-action="readya" style="font-size:16px;padding:16px">
        準備できた！
      </button>
    </div>
  `;
}

function renderAInput() {
  const p = G.players[G.answerIdx];
  const used = Array.from(G.used[p.id] || []);
  return `
    <div class="row mb-20">
      <div class="badge">${G.answerIdx + 1} / ${G.players.length}</div>
      <span class="dim small">${p.name} の回答</span>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px">
      <div class="keyword-box">
        <div class="keyword-label">テーマ</div>
        <div class="keyword-main" style="font-size:18px">${G.curTheme.name}</div>
      </div>
      <div class="keyword-box">
        <div class="keyword-label">形容詞</div>
        <div class="keyword-main accent" style="font-size:18px">${G.curAdj}</div>
      </div>
    </div>
    <p style="font-size:13px;font-weight:500;margin-bottom:8px">固有名詞で答えてください</p>
    <input id="ainput" type="text" placeholder="回答を入力（30文字以内）" maxlength="30" value="${G.answerInput}" class="mb-6"/>
    ${used.length ? `<p class="dim small mb-16">使用済み: ${used.join(', ')}</p>` : '<div class="mb-16"></div>'}
    <button class="btn-primary" data-action="suba">回答する →</button>
  `;
}

function renderReveal() {
  const cnt = {};
  for (const a of G.answers) {
    const k = a.v.trim().toLowerCase();
    cnt[k] = (cnt[k] || 0) + 1;
  }
  const mult = G.round === G.totalRounds ? 2 : 1;
  const basePts = 1 + G.curTheme.s;
  const items = G.answers.map(a => {
    const dupe = cnt[a.v.trim().toLowerCase()] > 1;
    return `
      <div class="answer-card mb-8 ${dupe ? 'dupe' : ''}">
        <div>
          <p class="dim small mb-4">${a.pn}</p>
          <p style="font-size:18px;font-weight:700">${a.v}</p>
        </div>
        <div class="text-center">
          ${dupe
            ? '<span class="badge badge-danger">被り</span>'
            : `<span style="font-size:22px;font-weight:700;color:var(--accent)">+${basePts * mult}</span>`
          }
        </div>
      </div>`;
  }).join('');
  return `
    <div class="mb-20">
      <div class="badge mb-12">REVEAL</div>
      <h2 class="mb-4">回答発表！</h2>
      <p class="dim small">${G.curTheme.name} × <span style="color:var(--accent)">${G.curAdj}</span>${G.round === G.totalRounds ? ' ｜ 2倍ラウンド' : ''}</p>
    </div>
    ${items}
    <button class="btn-primary mt-12" data-action="govote">投票へ →</button>
  `;
}

function renderVoting() {
  const voter = G.players[G.voteIdx];
  if (!voter) { setTimeout(() => { G.lastRoundScores = calcScores(); G.screen = 'rresult'; render(); }, 50); return '<div class="text-center" style="padding:3rem">集計中...</div>'; }
  const opts = G.answers.filter(a => a.pid !== voter.id);
  const btns = opts.map(a => `
    <button class="vote-btn mb-8" data-action="vote" data-t="${a.pid}">
      <div>
        <p class="dim small mb-2">${a.pn}</p>
        <p style="font-size:16px;font-weight:500">${a.v}</p>
      </div>
      <span class="dim" style="font-size:18px">→</span>
    </button>`).join('');
  return `
    <div class="row mb-20">
      <div class="badge">${G.voteIdx + 1} / ${G.players.length}</div>
      <span class="dim small">${voter.name} が投票</span>
    </div>
    <h2 class="mb-4">一番いい回答は？</h2>
    <p class="dim small mb-16">最多票に +1点ボーナス</p>
    ${btns}
    <button class="btn-ghost mt-8" data-action="skipv">スキップ</button>
  `;
}

function renderRResult() {
  const sorted = [...G.players].sort((a, b) => (G.scores[b.id] || 0) - (G.scores[a.id] || 0));
  const items = sorted.map((p, i) => {
    const rp = G.lastRoundScores[p.id] || 0;
    return `
      <div class="score-row mb-8">
        <div class="row gap-12">
          <span class="mono dim" style="font-size:18px;min-width:24px">${i + 1}</span>
          <span style="font-size:15px">${p.name}</span>
        </div>
        <div class="text-center">
          <span style="font-size:22px;font-weight:700">${G.scores[p.id] || 0}</span>
          <span class="dim small"> pt</span>
          ${rp > 0 ? `<div style="font-size:11px;color:var(--success)">+${rp}</div>` : ''}
        </div>
      </div>`;
  }).join('');
  const isLast = G.round >= G.totalRounds;
  return `
    <div class="mb-20">
      <div class="badge mb-12">ROUND ${G.round} RESULT</div>
      <h2>スコア</h2>
    </div>
    ${items}
    <div class="mt-16">
      ${isLast
        ? `<button class="btn-primary" data-action="final">最終結果を見る →</button>`
        : `<button class="btn-primary" data-action="nextr">次のラウンドへ →</button>`
      }
    </div>
  `;
}

function renderFinal() {
  const sorted = [...G.players].sort((a, b) => (G.scores[b.id] || 0) - (G.scores[a.id] || 0));
  const maxPts = G.scores[sorted[0].id] || 0;
  const items = sorted.map((p, i) => {
    const isWinner = (G.scores[p.id] || 0) === maxPts;
    return `
      <div class="score-row ${isWinner && i === 0 ? 'winner' : ''} mb-8">
        <div class="row gap-12">
          <span class="mono" style="font-size:24px;font-weight:700;min-width:32px;color:${i===0?'var(--accent)':'var(--text2)'}">${i + 1}</span>
          <div>
            <p style="font-size:16px;font-weight:500">${p.name}</p>
            ${isWinner && i === 0 ? '<p style="font-size:11px;color:var(--accent)">優勝！</p>' : ''}
          </div>
        </div>
        <div>
          <span style="font-size:28px;font-weight:700">${G.scores[p.id] || 0}</span>
          <span class="dim small"> pt</span>
        </div>
      </div>`;
  }).join('');
  return `
    <div class="text-center mb-24">
      <div class="badge badge-accent mb-12">GAME OVER</div>
      <h1 style="font-size:32px;margin-bottom:4px">お疲れ様！</h1>
      <p class="dim small">最終結果</p>
    </div>
    ${items}
    <button class="btn-ghost mt-24" data-action="restart">もう一度プレイ</button>
  `;
}

render();
</script>


</body></html>
